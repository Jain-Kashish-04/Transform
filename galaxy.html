<!DOCTYPE html>
<html>
	<head>
		<title>
			Solar System 
		</title>

		<style>
			body{
				
				background:black;
				overflow:hidden;
			}

			.solar-system{
				position:relative;
				width:800px;
				height:700px;
				margin-left:60px;
				
			}

			/* Sun */
			.sun{
				position:absolute;
				width:120px;
				height:120px;
				background:orange;
				border-radius:50%;
				top:50%;
				left:50%;
				transform:translate(-50%,-50%) scale(1);
			}

			/* Orbit Base */
			.orbit{
				position:absolute;
				border:1px dashed white;
				border-radius:50%;
				top:50%;
				left:50%;
				transform:translate(-50%,-50%);
			}

			/* Animation */
			@keyframes rotateOrbit{
				0%{ transform:translate(-50%,-50%) rotate(0deg);}
				100%{ transform:translate(-50%,-50%) rotate(360deg);}
			}

			/* Common Planet */
			.planet{
				position:absolute;
				top:50%;
				left:0;
				transform:translateY(-50%);
				border-radius:50%;
			}

			/* Mercury */
			.mercury-orbit{ width:200px;height:200px;
				animation:rotateOrbit 4s linear infinite;
			}
			.mercury{ width:15px;height:15px;background:gray;}

			/* Venus */
			.venus-orbit{ width:260px;height:260px;
				animation:rotateOrbit 6s linear infinite;
			}
			.venus{ width:25px;height:25px;background:yellow;}

			/* Earth */
			.earth-orbit{ width:330px;height:330px;
				animation:rotateOrbit 8s linear infinite;
			}
			.earth{ width:30px;height:30px;background:blue;}

			/* Moon */
			.moon-orbit{
				position:absolute;
				width:70px;height:70px;
				top:50%;left:50%;
				transform:translate(-50%,-50%);
				animation:rotateOrbit 2s linear infinite reverse;
			}
			.moon{
				position:absolute;
				width:8px;height:8px;
				background:white;
				top:50%;left:0;
				border-radius:50%;
				transform:translateY(-50%);
			}

			/* Mars */
			.mars-orbit{ width:400px;height:400px;
				animation:rotateOrbit 10s linear infinite;
			}
			.mars{ width:22px;height:22px;background:red;}

			/* Jupiter */
			.jupiter-orbit{ width:480px;height:480px;
				animation:rotateOrbit 14s linear infinite;
			}
			.jupiter{ width:50px;height:50px;background:orange;}

			/* Saturn */
			.saturn-orbit{ width:560px;height:560px;
				animation:rotateOrbit 18s linear infinite;
			}
			.saturn{ width:40px;height:40px;background:gold;}

			/* Uranus */
			.uranus-orbit{ width:640px;height:640px;
				animation:rotateOrbit 22s linear infinite;
			}
			.uranus{ width:35px;height:35px;background:lightblue;}
		</style>
	</head>

	<body>
		<div class="solar-system">

			<div class="sun"></div>

			<div class="orbit mercury-orbit">
				<div class="planet mercury"></div>
			</div>

			<div class="orbit venus-orbit">
				<div class="planet venus"></div>
			</div>

			<div class="orbit earth-orbit">
				<div class="planet earth">
					<div class="moon-orbit">
						<div class="moon"></div>
					</div>
				</div>
			</div>

			<div class="orbit mars-orbit">
				<div class="planet mars"></div>
			</div>

			<div class="orbit jupiter-orbit">
				<div class="planet jupiter"></div>
			</div>

			<div class="orbit saturn-orbit">
				<div class="planet saturn"></div>
			</div>

			<div class="orbit uranus-orbit">
				<div class="planet uranus"></div>
			</div>

		</div>
	</body>
</html>
